model_name: Qwen/Qwen2.5-1.5B
output_dir: checkpoints/sft
seed_data_path: data/processed/sft_seed.jsonl
max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 20
  logging_steps: 5
  save_steps: 50
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  report_to: wandb
  run_name: finagent-sft-coldstart
  max_grad_norm: 1.0

