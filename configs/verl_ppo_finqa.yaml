data:
  tokenizer: null
  train_files: data/verl/finqa/train.parquet
  val_files: data/verl/finqa/validation.parquet
  train_data_num: null
  val_data_num: null
  prompt_key: prompt
  max_prompt_length: 1024
  max_response_length: 256
  max_start_length: 1024
  max_obs_length: 512
  train_batch_size: 8
  val_batch_size: 8
  return_raw_input_ids: false
  return_raw_chat: false
  shuffle_train_dataloader: true

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: Qwen/Qwen2.5-1.5B
    external_lib: null
    override_config: {}
    enable_gradient_checkpointing: true
    use_remove_padding: false
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 8
    ppo_micro_batch_size: 1
    use_dynamic_bsz: false
    ppo_max_token_len_per_gpu: 2048
    grad_clip: 1.0
    state_masking: true
    clip_ratio: 0.2
    entropy_coeff: 0.001
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    shuffle: false
    ulysses_sequence_parallel_size: 1
    optim:
      lr: 1.0e-6
      lr_warmup_steps_ratio: 0.1
      min_lr_ratio: null
      warmup_style: constant
      total_training_steps: -1
    fsdp_config:
      wrap_policy:
        min_num_params: 0
      param_offload: true
      grad_offload: true
      optimizer_offload: true
      fsdp_size: -1
  ref:
    fsdp_config:
      param_offload: true
      wrap_policy:
        min_num_params: 0
      fsdp_size: -1
    log_prob_micro_batch_size: 4
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    ulysses_sequence_parallel_size: ${actor_rollout_ref.actor.ulysses_sequence_parallel_size}
  rollout:
    name: vllm
    temperature: 1.0
    top_k: -1
    top_p: 0.95
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    dtype: bfloat16
    gpu_memory_utilization: 0.35
    ignore_eos: false
    enforce_eager: true
    free_cache_engine: true
    load_format: dummy_dtensor
    tensor_model_parallel_size: 1
    max_num_batched_tokens: 2048
    max_num_seqs: 16
    log_prob_micro_batch_size: 4
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    do_sample: true
    n: 1
    n_agent: 2

critic:
  strategy: fsdp
  optim:
    lr: 1.0e-5
    lr_warmup_steps_ratio: 0.0
    min_lr_ratio: null
    warmup_style: constant
    total_training_steps: -1
  model:
    path: Qwen/Qwen2.5-1.5B
    tokenizer_path: ${actor_rollout_ref.model.path}
    override_config: {}
    external_lib: ${actor_rollout_ref.model.external_lib}
    enable_gradient_checkpointing: true
    use_remove_padding: false
    fsdp_config:
      param_offload: true
      grad_offload: true
      optimizer_offload: true
      wrap_policy:
        min_num_params: 0
      fsdp_size: -1
  ppo_mini_batch_size: ${actor_rollout_ref.actor.ppo_mini_batch_size}
  ppo_micro_batch_size: 1
  forward_micro_batch_size: ${critic.ppo_micro_batch_size}
  use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
  ppo_max_token_len_per_gpu: 4096
  forward_max_token_len_per_gpu: ${critic.ppo_max_token_len_per_gpu}
  ulysses_sequence_parallel_size: 1
  ppo_epochs: ${actor_rollout_ref.actor.ppo_epochs}
  shuffle: ${actor_rollout_ref.actor.shuffle}
  grad_clip: 1.0
  cliprange_value: 0.5

reward_model:
  enable: false
  strategy: fsdp
  model:
    input_tokenizer: ${actor_rollout_ref.model.path}
    path: null
    external_lib: ${actor_rollout_ref.model.external_lib}
    use_remove_padding: false
    fsdp_config:
      min_num_params: 0
      param_offload: false
  micro_batch_size: 4
  max_length: null
  ulysses_sequence_parallel_size: 1
  use_dynamic_bsz: ${critic.use_dynamic_bsz}
  forward_max_token_len_per_gpu: ${critic.forward_max_token_len_per_gpu}

retriever:
  url: http://127.0.0.1:5000/retrieve
  topk: 3

algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  no_think_rl: false
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
  state_masking:
    start_state_marker: "<observation>"
    end_state_marker: "</observation>"

trainer:
  total_epochs: 4
  total_training_steps: 500
  project_name: finagent_r1
  experiment_name: finqa_3tool_grpo_verl
  logger: ['console', 'wandb']
  nnodes: 1
  n_gpus_per_node: 1
  save_freq: 100
  test_freq: 100
  critic_warmup: 0
  default_hdfs_dir: null
  default_local_dir: checkpoints/grpo_verl

finagent_reward:
  accuracy: 1.0
  format: 0.1
  tool_use: 0.15
  multi_tool: 0.1
  reasoning_after_observation: 0.05
  no_tool_penalty: -0.05
  overuse_penalty: -0.1
  invalid_action_penalty: -0.05
  max_tool_calls: 4
  tolerance: 0.01

max_turns: 4
do_search: true
